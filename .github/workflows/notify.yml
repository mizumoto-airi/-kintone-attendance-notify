name: notify

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 平日 JST 9:00（UTC 0:00）に自動実行
    - cron: '40 5 19 3 *'   # テスト用：3/19 JST 14:40（確認後に削除）
  workflow_dispatch:        # GitHubの画面から手動実行もできる

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install requests
        run: pip install requests jpholiday
      - name: run script
        env:
          KINTONE_LEAVE_APP_TOKEN: ${{ secrets.KINTONE_LEAVE_APP_TOKEN }}
          KINTONE_MEMBER_APP_TOKEN: ${{ secrets.KINTONE_MEMBER_APP_TOKEN }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python notify.py
