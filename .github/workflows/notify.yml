name: notify

on:
  schedule:
    - cron: '0 23 * * 0-4'  # 日本時間 平日8時（UTC 23時）に自動実行
  workflow_dispatch:         # GitHubの画面から手動実行もできる

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install requests
        run: pip install requests
      - name: run script
        env:
          KINTONE_LEAVE_APP_TOKEN: ${{ secrets.KINTONE_LEAVE_APP_TOKEN }}
          KINTONE_MEMBER_APP_TOKEN: ${{ secrets.KINTONE_MEMBER_APP_TOKEN }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python notify.py
